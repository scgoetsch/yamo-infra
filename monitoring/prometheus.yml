global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: yamo-bridge
    static_configs:
      - targets: ["bridge:4001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: yamo-gateway
    static_configs:
      - targets: ["kernel:3333"]
    metrics_path: /metrics
    scrape_interval: 15s
